<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amazon キーワードリサーチツール</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background: #f0f2f5;
      color: #333;
      min-height: 100vh;
    }
    header {
      background: #232f3e;
      color: white;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 { font-size: 20px; font-weight: 600; }
    header span { font-size: 12px; color: #ff9900; font-weight: bold; }
    header .nav a { color: #ff9900; text-decoration: none; font-size: 14px; margin-left: 20px; }
    header .nav a:hover { text-decoration: underline; }
    .container { max-width: 1100px; margin: 32px auto; padding: 0 20px; }

    .search-box {
      background: white;
      border-radius: 12px;
      padding: 28px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      margin-bottom: 24px;
    }
    .search-box label { display: block; font-weight: 600; margin-bottom: 10px; font-size: 15px; }
    .search-row { display: flex; gap: 10px; }
    .search-input-wrap {
      flex: 1;
      position: relative;
    }
    .search-row input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #ddd;
      border-radius: 8px;
      font-size: 16px;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-row input:focus { border-color: #ff9900; }

    /* オートコンプリートドロップダウン */
    .suggest-dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      background: white;
      border: 1px solid #ddd;
      border-radius: 8px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
      z-index: 100;
      overflow: hidden;
    }
    .suggest-dropdown.show { display: block; }
    .suggest-item {
      padding: 11px 16px;
      cursor: pointer;
      font-size: 15px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid #f5f5f5;
    }
    .suggest-item:last-child { border-bottom: none; }
    .suggest-item:hover, .suggest-item.active { background: #fffbf2; }
    .suggest-item::before {
      content: '🔍';
      font-size: 13px;
      opacity: 0.5;
      flex-shrink: 0;
    }
    .search-row button {
      padding: 12px 28px;
      background: #ff9900;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .search-row button:hover { background: #e88a00; }
    .search-row button:disabled { background: #ccc; cursor: not-allowed; }

    .tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 16px;
    }
    .tab {
      padding: 10px 24px;
      border-radius: 8px 8px 0 0;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      background: #ddd;
      color: #666;
      border: none;
    }
    .tab.active { background: white; color: #232f3e; }

    .panel {
      background: white;
      border-radius: 0 12px 12px 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      padding: 24px;
      display: none;
    }
    .panel.active { display: block; }

    .loading { text-align: center; padding: 40px; color: #999; font-size: 15px; }

    /* キーワードテーブル */
    .keyword-grid {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 0;
    }
    .keyword-header {
      display: contents;
      font-weight: 700;
      font-size: 13px;
      color: #666;
      text-transform: uppercase;
    }
    .keyword-header div {
      padding: 10px 16px;
      background: #f8f9fa;
      border-bottom: 2px solid #eee;
    }
    .keyword-row {
      display: contents;
    }
    .keyword-row div {
      padding: 12px 16px;
      border-bottom: 1px solid #f0f0f0;
      display: flex;
      align-items: center;
    }
    .keyword-row:hover div { background: #fffbf2; }
    .keyword-text { font-size: 15px; cursor: pointer; color: #0066c0; }
    .keyword-text:hover { text-decoration: underline; }
    .badge {
      font-size: 11px;
      background: #e8f4fd;
      color: #0066c0;
      padding: 3px 8px;
      border-radius: 12px;
      font-weight: 600;
    }

    /* 競合テーブル */
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th {
      text-align: left;
      padding: 10px 14px;
      background: #f8f9fa;
      font-weight: 700;
      color: #555;
      border-bottom: 2px solid #eee;
    }
    td { padding: 12px 14px; border-bottom: 1px solid #f0f0f0; vertical-align: top; }
    tr:hover td { background: #fffbf2; }
    .asin-badge {
      font-family: monospace;
      font-size: 12px;
      background: #f0f0f0;
      padding: 2px 6px;
      border-radius: 4px;
    }
    .product-title { max-width: 360px; line-height: 1.4; }
    .product-link { color: #0066c0; text-decoration: none; font-size: 12px; }
    .product-link:hover { text-decoration: underline; }
    .price { font-weight: 700; color: #B12704; }
    .empty { text-align: center; padding: 40px; color: #999; }

    .note {
      font-size: 12px;
      color: #999;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid #eee;
    }
  </style>
</head>
<body>

<header>
  <h1>Amazon キーワードリサーチ</h1>
  <span>JP</span>
  <div class="nav">
    <a href="/trends.html">トレンドランキング →</a>
  </div>
</header>

<div class="container">
  <div class="search-box">
    <label>キーワードを入力</label>
    <div class="search-row">
      <div class="search-input-wrap">
        <input type="text" id="searchInput" placeholder="例: プロテイン、ヨガマット、加湿器..." autocomplete="off" />
        <div class="suggest-dropdown" id="suggestDropdown"></div>
      </div>
      <button id="searchBtn" onclick="search()">検索</button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('keywords')">キーワード候補</button>
    <button class="tab" onclick="switchTab('competitors')">競合商品</button>
  </div>

  <div id="keywords-panel" class="panel active">
    <div class="empty" id="keywords-empty">キーワードを入力して検索してください</div>
    <div id="keywords-content" style="display:none">
      <div class="keyword-grid" id="keywordGrid">
        <div class="keyword-header">
          <div>キーワード</div>
          <div>種別</div>
        </div>
      </div>
      <p class="note">※ ボリューム数値はAmazon公式APIキーが必要です。セラースプライト有料プランにアップグレードするとより詳細なデータが取得できます。</p>
    </div>
  </div>

  <div id="competitors-panel" class="panel">
    <div class="empty" id="competitors-empty">キーワードを入力して検索してください</div>
    <div id="competitors-content" style="display:none">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>ASIN</th>
            <th>商品タイトル</th>
            <th>価格</th>
            <th>レビュー数</th>
          </tr>
        </thead>
        <tbody id="competitorTable"></tbody>
      </table>
      <p class="note">※ 売上ランキング・詳細データはセラースプライトAPIキー（有料プラン）で取得できます。</p>
    </div>
  </div>
</div>

<script>
  let currentTab = 'keywords';
  let suggestIndex = -1;
  let suggestTimer = null;

  function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('active', ['keywords','competitors'][i] === tab);
    });
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById(tab + '-panel').classList.add('active');
  }

  const input = document.getElementById('searchInput');
  const dropdown = document.getElementById('suggestDropdown');

  // 入力のたびに候補を取得（200msデバウンス）
  input.addEventListener('input', () => {
    clearTimeout(suggestTimer);
    const q = input.value.trim();
    if (!q) { closeSuggest(); return; }
    suggestTimer = setTimeout(() => fetchSuggestions(q), 200);
  });

  input.addEventListener('keydown', e => {
    const items = dropdown.querySelectorAll('.suggest-item');
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      suggestIndex = Math.min(suggestIndex + 1, items.length - 1);
      updateActive(items);
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      suggestIndex = Math.max(suggestIndex - 1, -1);
      updateActive(items);
    } else if (e.key === 'Enter') {
      if (suggestIndex >= 0 && items[suggestIndex]) {
        selectSuggest(items[suggestIndex].dataset.value);
      } else {
        closeSuggest();
        search();
      }
    } else if (e.key === 'Escape') {
      closeSuggest();
    }
  });

  // フォーカスが外れたら候補を閉じる
  document.addEventListener('click', e => {
    if (!e.target.closest('.search-input-wrap')) closeSuggest();
  });

  function updateActive(items) {
    items.forEach((el, i) => el.classList.toggle('active', i === suggestIndex));
    if (suggestIndex >= 0 && items[suggestIndex]) {
      input.value = items[suggestIndex].dataset.value;
    }
  }

  async function fetchSuggestions(q) {
    try {
      const res = await fetch('/api/suggest?q=' + encodeURIComponent(q));
      const data = await res.json();
      showSuggestions(data.suggestions || []);
    } catch {
      closeSuggest();
    }
  }

  function showSuggestions(suggestions) {
    suggestIndex = -1;
    if (!suggestions.length) { closeSuggest(); return; }
    dropdown.innerHTML = suggestions.map(s =>
      `<div class="suggest-item" data-value="${s.replace(/"/g,'&quot;')}" onclick="selectSuggest('${s.replace(/'/g,"\\'")}')">
        ${s}
      </div>`
    ).join('');
    dropdown.classList.add('show');
  }

  function selectSuggest(value) {
    input.value = value;
    closeSuggest();
    search();
  }

  function closeSuggest() {
    dropdown.classList.remove('show');
    dropdown.innerHTML = '';
    suggestIndex = -1;
  }

  async function search() {
    const q = document.getElementById('searchInput').value.trim();
    if (!q) return;

    const btn = document.getElementById('searchBtn');
    btn.disabled = true;
    btn.textContent = '検索中...';

    await Promise.all([fetchKeywords(q), fetchCompetitors(q)]);

    btn.disabled = false;
    btn.textContent = '検索';
  }

  async function fetchKeywords(q) {
    document.getElementById('keywords-empty').innerHTML = '<div class="loading">読み込み中...</div>';
    document.getElementById('keywords-content').style.display = 'none';

    try {
      const res = await fetch('/api/keywords?q=' + encodeURIComponent(q));
      const data = await res.json();

      if (!data.keywords || data.keywords.length === 0) {
        document.getElementById('keywords-empty').textContent = 'キーワードが見つかりませんでした';
        return;
      }

      const grid = document.getElementById('keywordGrid');
      // ヘッダー以外を削除
      while (grid.children.length > 2) grid.removeChild(grid.lastChild);

      data.keywords.forEach(kw => {
        const row = document.createElement('div');
        row.className = 'keyword-row';
        row.innerHTML = `
          <div><span class="keyword-text" onclick="refineSearch('${kw.replace(/'/g,"\\'")}')"> ${kw}</span></div>
          <div><span class="badge">サジェスト</span></div>
        `;
        grid.appendChild(row);
      });

      document.getElementById('keywords-empty').style.display = 'none';
      document.getElementById('keywords-content').style.display = 'block';
    } catch(e) {
      document.getElementById('keywords-empty').textContent = 'エラー: ' + e.message;
    }
  }

  async function fetchCompetitors(q) {
    document.getElementById('competitors-empty').innerHTML = '<div class="loading">読み込み中...</div>';
    document.getElementById('competitors-content').style.display = 'none';

    try {
      const res = await fetch('/api/competitors?q=' + encodeURIComponent(q));
      const data = await res.json();

      if (!data.products || data.products.length === 0) {
        document.getElementById('competitors-empty').textContent = '商品が見つかりませんでした';
        return;
      }

      const tbody = document.getElementById('competitorTable');
      tbody.innerHTML = '';
      data.products.forEach((p, i) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${i + 1}</td>
          <td><span class="asin-badge">${p.asin}</span></td>
          <td class="product-title">
            ${p.title}<br>
            <a href="${p.url}" target="_blank" class="product-link">Amazonで見る →</a>
          </td>
          <td class="price">${p.price}</td>
          <td>${p.reviews}</td>
        `;
        tbody.appendChild(tr);
      });

      document.getElementById('competitors-empty').style.display = 'none';
      document.getElementById('competitors-content').style.display = 'block';
    } catch(e) {
      document.getElementById('competitors-empty').textContent = 'エラー: ' + e.message;
    }
  }

  function refineSearch(kw) {
    document.getElementById('searchInput').value = kw;
    search();
  }
</script>

</body>
</html>
